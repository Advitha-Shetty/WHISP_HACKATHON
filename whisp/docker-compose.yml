# Local data stack for WHISP (optional). Node and Vite still run on the host.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whisp
      POSTGRES_PASSWORD: whisp
      POSTGRES_DB: whisp_db
    ports:
      - '5432:5432'
    volumes:
      - whisp_pg:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - whisp_mongo:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  whisp_pg: {}
  whisp_mongo: {}
